# .github/workflows/scrape.yml
# Scrapes all 4 sources IN PARALLEL on a GitHub-hosted runner, merges, and publishes
# combined_tire_data.json as a rolling Release asset that WordPress pulls from.

name: Scrape tires & publish feed

on:
  schedule:
    - cron: '17 */6 * * *'       # every 6h at :17 UTC (GitHub may delay a few min)
  workflow_dispatch: {}            # manual "Run workflow" button (use this to test)
  push:                            # publish immediately when scraper code changes
    branches: [ main ]
    paths:
      - 'Leita/**'
      - 'merge_tires.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write                  # required to update the Release asset

concurrency:
  group: tire-scrape
  cancel-in-progress: false

env:
  WP_SITE: https://dekkjahusid.is

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all 4 spiders IN PARALLEL
        run: |
          # Background each spider (like run_all.py's Pool). Per-domain politeness is
          # set INSIDE each spider's custom_settings, so no -s flags needed here.
          # No 'set -e': one spider failing must NOT abort the others.
          scrapy crawl klettur -O klettur.json &
          scrapy crawl mitra   -O mitra.json   &
          scrapy crawl nesdekk -O nesdekk.json &
          scrapy crawl n1      -O n1.json       &
          wait
          echo "All spiders finished. Raw line counts:"
          wc -l klettur.json mitra.json nesdekk.json n1.json 2>/dev/null || true

      - name: Merge
        run: python merge_tires.py

      - name: Don't publish a broken scrape
        run: |
          # Only guard against a TOTAL failure (empty / invalid / missing file).
          # No size threshold here on purpose: WordPress already rejects any feed
          # below half the current catalogue and keeps a restorable backup.
          # `python -c` exits non-zero if the file is missing or not valid JSON.
          COUNT=$(python -c "import json; print(len(json.load(open('combined_tire_data.json'))))")
          echo "Merged $COUNT tires"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::0 tires merged -- refusing to publish an empty feed."
            exit 1
          fi

      - name: Publish feed as a rolling Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tire-feed
          name: Tire feed (latest)
          files: combined_tire_data.json

      - name: Nudge WordPress to import now
        run: curl -fsS --max-time 30 "$WP_SITE/wp-cron.php?doing_wp_cron=1" >/dev/null || true