# .github/workflows/scrape.yml
# Scrapes all tire sources from your self-hosted Proxmox runner,
# merges them into combined_tire_data.json,
# publishes the JSON as a rolling GitHub Release asset,
# and nudges WordPress to import the newest feed.

name: Scrape tires & publish feed

on:
  schedule:
    # Once per day at 03:17 Iceland time / UTC
    - cron: '17 3 * * *'

  # Allows manual "Run workflow" from GitHub Actions
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tire-scrape
  cancel-in-progress: false

env:
  WP_SITE: https://dekkjahusid.is

jobs:
  scrape:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrapers
        run: |
          set -e
          . .venv/bin/activate

          scrapy crawl klettur -O klettur.json -s CONCURRENT_REQUESTS=16 -s CONCURRENT_REQUESTS_PER_DOMAIN=16
          scrapy crawl mitra   -O mitra.json   -s CONCURRENT_REQUESTS=8
          scrapy crawl nesdekk -O nesdekk.json -s CONCURRENT_REQUESTS=4 -s DOWNLOAD_DELAY=0.5
          scrapy crawl n1      -O n1.json      -s CONCURRENT_REQUESTS=8

      - name: Merge tire data
        run: |
          set -e
          . .venv/bin/activate
          python merge_tires.py

      - name: Count merged tires
        run: |
          set -e
          . .venv/bin/activate
          COUNT=$(python -c "import json; print(len(json.load(open('combined_tire_data.json'))))")
          echo "Merged $COUNT tires"

      - name: Publish feed as rolling Release asset
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: tire-feed
          name: Tire feed latest
          files: combined_tire_data.json
          fail_on_unmatched_files: true

