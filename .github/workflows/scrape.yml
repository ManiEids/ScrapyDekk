# .github/workflows/scrape.yml

name: Scrape tires & publish feed

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - 'Leita/**'
      - 'merge_tires.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write

concurrency:
  group: tire-scrape
  cancel-in-progress: false

env:
  WP_SITE: https://dekkjahusid.is

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Klettur
        run: |
          set -e
          scrapy crawl klettur -O klettur.json
          python -c "import json; d=json.load(open('klettur.json')); print('Klettur raw:', len(d)); assert len(d) > 0"

      - name: Run Mitra
        run: |
          set -e
          scrapy crawl mitra -O mitra.json
          python -c "import json; d=json.load(open('mitra.json')); print('Mitra raw:', len(d)); assert len(d) > 0"

      - name: Run Nesdekk
        run: |
          set -e
          scrapy crawl nesdekk -O nesdekk.json
          python -c "import json; d=json.load(open('nesdekk.json')); print('Nesdekk raw:', len(d)); assert len(d) > 0"

      - name: Run N1
        run: |
          set -e
          scrapy crawl n1 -O n1.json
          python -c "import json; d=json.load(open('n1.json')); print('N1 raw:', len(d)); assert len(d) > 0"

      - name: Merge
        run: |
          set -e
          python merge_tires.py

      - name: Validate merged feed by seller
        run: |
          set -e
          python - <<'PY'
          import json
          from collections import Counter

          d = json.load(open("combined_tire_data.json", encoding="utf-8"))
          counts = Counter(x.get("seller") for x in d)

          print("Merged total:", len(d))
          for seller in ["Klettur", "Mitra", "Nesdekk", "N1"]:
              print(f"{seller}: {counts.get(seller, 0)}")

          required = ["Klettur", "Mitra", "Nesdekk", "N1"]
          missing = [s for s in required if counts.get(s, 0) == 0]

          if missing:
              raise SystemExit(f"Refusing to publish. Missing sellers: {', '.join(missing)}")

          if len(d) < 4000:
              raise SystemExit(f"Refusing to publish suspiciously small feed: {len(d)} rows")
          PY

      - name: Publish feed as rolling Release asset
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: tire-feed
          name: Tire feed latest
          files: combined_tire_data.json
          fail_on_unmatched_files: true

      - name: Nudge WordPress import
        run: |
          curl -fsS --max-time 30 "$WP_SITE/wp-cron.php?doing_wp_cron=1" >/dev/null || true