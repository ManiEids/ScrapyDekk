# .github/workflows/scrape.yml
# Scrapes tire sources, merges them into combined_tire_data.json,
# publishes the JSON as a rolling GitHub Release asset,
# and directly triggers WordPress to import the newest feed.

name: Scrape tires & publish feed

on:
  schedule:
    # Once per day at 03:17 Iceland time / UTC
    - cron: '17 3 * * *'

  workflow_dispatch: {}

  push:
    branches: [ main ]
    paths:
      - 'Leita/**'
      - 'merge_tires.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write

concurrency:
  group: tire-scrape
  cancel-in-progress: false

env:
  WP_SITE: https://dekkjahusid.is

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python files compile
        run: |
          set -e
          python -m py_compile merge_tires.py
          find Leita -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Run core tire spiders in parallel
        run: |
          set -e

          run_spider() {
            NAME="$1"
            OUT="$2"
            LOG="$3"
            shift 3

            echo "Starting $NAME..."
            timeout 15m scrapy crawl "$NAME" -O "$OUT" \
              -s DOWNLOAD_TIMEOUT=30 \
              -s CLOSESPIDER_TIMEOUT=840 \
              "$@" > "$LOG" 2>&1
          }

          run_spider klettur klettur.json klettur.log \
            -s CONCURRENT_REQUESTS=8 \
            -s CONCURRENT_REQUESTS_PER_DOMAIN=4 \
            -s DOWNLOAD_DELAY=0.1 \
            -s AUTOTHROTTLE_ENABLED=True \
            -s AUTOTHROTTLE_START_DELAY=0.2 \
            -s AUTOTHROTTLE_MAX_DELAY=4 \
            -s AUTOTHROTTLE_TARGET_CONCURRENCY=2.0 &
          PID_KLETTUR=$!

          run_spider mitra mitra.json mitra.log \
            -s CONCURRENT_REQUESTS=8 \
            -s CONCURRENT_REQUESTS_PER_DOMAIN=4 \
            -s DOWNLOAD_DELAY=0.1 \
            -s AUTOTHROTTLE_ENABLED=True \
            -s AUTOTHROTTLE_START_DELAY=0.2 \
            -s AUTOTHROTTLE_MAX_DELAY=4 \
            -s AUTOTHROTTLE_TARGET_CONCURRENCY=2.0 &
          PID_MITRA=$!

          run_spider nesdekk nesdekk.json nesdekk.log \
            -s CONCURRENT_REQUESTS=4 \
            -s CONCURRENT_REQUESTS_PER_DOMAIN=2 \
            -s DOWNLOAD_DELAY=0.25 \
            -s AUTOTHROTTLE_ENABLED=True \
            -s AUTOTHROTTLE_START_DELAY=0.5 \
            -s AUTOTHROTTLE_MAX_DELAY=6 \
            -s AUTOTHROTTLE_TARGET_CONCURRENCY=1.5 &
          PID_NESDEKK=$!

          FAIL=0

          wait $PID_KLETTUR || FAIL=1
          wait $PID_MITRA || FAIL=1
          wait $PID_NESDEKK || FAIL=1

          echo "===== Klettur log tail ====="
          tail -n 120 klettur.log || true

          echo "===== Mitra log tail ====="
          tail -n 120 mitra.log || true

          echo "===== Nesdekk log tail ====="
          tail -n 120 nesdekk.log || true

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::At least one core spider failed or timed out."
            exit 1
          fi

          python - <<'PY'
          import json

          files = {
              "Klettur": "klettur.json",
              "Mitra": "mitra.json",
              "Nesdekk": "nesdekk.json",
          }

          for name, path in files.items():
              with open(path, encoding="utf-8") as f:
                  data = json.load(f)
              print(f"{name} raw: {len(data)}")
              if len(data) == 0:
                  raise SystemExit(f"{name} returned 0 rows")
          PY

      - name: Run N1 Algolia spider optional
        run: |
          set +e

          timeout 12m scrapy crawl n1 -O n1.json \
            -s CONCURRENT_REQUESTS=4 \
            -s CONCURRENT_REQUESTS_PER_DOMAIN=4 \
            -s DOWNLOAD_DELAY=0.05 \
            -s AUTOTHROTTLE_ENABLED=True \
            -s AUTOTHROTTLE_START_DELAY=0.2 \
            -s AUTOTHROTTLE_MAX_DELAY=2 \
            -s AUTOTHROTTLE_TARGET_CONCURRENCY=2.0 \
            > n1.log 2>&1
          STATUS=$?

          echo "===== N1 log tail ====="
          tail -n 160 n1.log || true

          if [ "$STATUS" -ne 0 ]; then
            echo "::warning::N1 spider failed or timed out. Continuing with empty n1.json."
            echo "[]" > n1.json
            exit 0
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("n1.json")
          if not path.exists():
              print("N1 output missing; creating empty n1.json")
              path.write_text("[]", encoding="utf-8")
              raise SystemExit(0)

          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except Exception as exc:
              print(f"N1 output invalid JSON: {exc}; replacing with []")
              path.write_text("[]", encoding="utf-8")
              raise SystemExit(0)

          print(f"N1 raw: {len(data)}")
          if len(data) == 0:
              print("::warning::N1 returned 0 rows. Continuing without N1.")
          PY

      - name: Merge tire data
        run: |
          set -e
          python merge_tires.py

      - name: Validate merged feed
        run: |
          set -e
          python - <<'PY'
          import json
          from collections import Counter

          with open("combined_tire_data.json", encoding="utf-8") as f:
              data = json.load(f)

          counts = Counter(item.get("seller") for item in data)

          print("Merged total:", len(data))
          for seller in ["Klettur", "Mitra", "Nesdekk", "N1"]:
              print(f"{seller}: {counts.get(seller, 0)}")

          missing_core = [
              seller for seller in ["Klettur", "Mitra", "Nesdekk"]
              if counts.get(seller, 0) == 0
          ]

          if missing_core:
              raise SystemExit(f"Refusing to publish. Missing core seller data: {', '.join(missing_core)}")

          if len(data) < 1000:
              raise SystemExit(f"Refusing to publish suspiciously small feed: {len(data)} rows")

          print("Feed validation passed.")
          PY

      - name: Publish feed as rolling Release asset
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: tire-feed
          name: Tire feed latest
          files: combined_tire_data.json
          fail_on_unmatched_files: true

      - name: Trigger WordPress feed import
        run: |
          set -e

          HTTP_CODE=$(curl -sS --max-time 120 \
            -X POST \
            -H "X-DTS-Sync-Secret: ${{ secrets.DTS_SYNC_SECRET }}" \
            -o dts-sync-response.json \
            -w "%{http_code}" \
            "$WP_SITE/wp-json/dts/v1/sync")

          echo "WordPress sync HTTP status: $HTTP_CODE"
          echo "WordPress sync response:"
          cat dts-sync-response.json
          echo ""

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::WordPress sync failed with HTTP $HTTP_CODE"
            exit 1
          fi